syntax = "proto3";

package raft.v1;

option go_package = "github.com/Abhijeetgupta55/raftkv/proto/raft/v1;raftv1";

// Raft is the node-to-node consensus protocol, deliberately a separate
// service from the client-facing kv.v1: cluster internals and clients
// never share a surface. Field semantics follow the Raft paper (Figure 2)
// exactly; the one extension is the conflict_* fields on
// AppendEntriesResponse, which let a leader skip whole conflicting terms
// when repairing a follower's log instead of probing one entry per RPC.
service Raft {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
}

message RequestVoteRequest {
  uint64 term = 1;
  uint64 candidate_id = 2;
  // The election restriction (paper §5.4.1): voters compare this against
  // their own log and refuse candidates that are behind, which is what
  // makes "won an election" imply "holds every committed entry".
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  // The voter's currentTerm; a candidate seeing a higher term steps down.
  uint64 term = 1;
  bool vote_granted = 2;
}

// LogEntry carries one replicated command. The command bytes are opaque
// to Raft — it replicates and orders them, the state machine interprets
// them. index is carried explicitly (not inferred from position) so an
// entry is self-describing wherever it appears: an RPC, the on-disk log,
// or a test fixture.
message LogEntry {
  uint64 term = 1;
  uint64 index = 2;
  bytes command = 3;
}

message AppendEntriesRequest {
  uint64 term = 1;
  uint64 leader_id = 2;
  // The log-matching check: the follower must hold an entry at
  // prev_log_index with term prev_log_term or reject, which is the
  // induction step that keeps all logs identical up to any shared point.
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5; // empty for pure heartbeats
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  // On rejection: the term of the conflicting entry (0 if the follower's
  // log is simply too short) and the first index the follower holds for
  // that term. The leader uses these to move nextIndex back a whole term
  // at a time rather than decrementing by one.
  uint64 conflict_term = 3;
  uint64 conflict_index = 4;
}
