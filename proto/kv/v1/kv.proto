syntax = "proto3";

package kv.v1;

option go_package = "github.com/Abhijeetgupta55/raftkv/proto/kv/v1;kvv1";

// KV is the client-facing API of the store. Every node exposes it; from
// the Raft milestone onward, non-leader nodes reject writes with a status
// error carrying a leader hint rather than proxying the request.
//
// Raft's internal RPCs (AppendEntries, RequestVote, ...) are deliberately
// a separate schema: clients and cluster internals never share a surface.
service KV {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

// Keys are UTF-8 strings for the sake of humane CLIs, logs, and debugging;
// values are opaque bytes because the store has no business interpreting
// them. See docs/DECISIONS/0002 for the trade-off discussion.

message PutRequest {
  string key = 1;
  bytes value = 2;
}

message PutResponse {
  // Deliberately empty. Later concerns (applied index for read-your-writes,
  // etc.) arrive as new fields, which proto3 adds compatibly.
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bytes value = 1;
  // found distinguishes "key absent" from "key present with empty value".
  // A miss is a normal answer in a KV workload, not an error; gRPC status
  // codes are reserved for actual failures.
  bool found = 2;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  // existed reports whether the key was present before the delete.
  // The delete itself is idempotent either way.
  bool existed = 1;
}
